<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyAI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --text: #f0f0f0;
    --text-muted: #666;
    --success: #00e676;
    --error: #ff1744;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  /* 배경 효과 */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(0,229,255,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(124,58,237,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 680px;
    position: relative;
    z-index: 1;
  }

  /* 헤더 */
  header {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.8;
  }

  h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -1px;
    color: var(--text);
    line-height: 1.1;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 8px;
    font-weight: 300;
  }

  /* 탭 */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 20px;
  }

  .tab {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .tab.active {
    background: var(--surface2);
    color: var(--accent);
    border: 1px solid rgba(0,229,255,0.2);
  }

  .tab:hover:not(.active) {
    color: var(--text);
    background: rgba(255,255,255,0.03);
  }

  /* 패널 */
  .panel {
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .panel.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 카드 */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
  }

  .card-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 12px;
  }

  /* 텍스트 입력 */
  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    padding: 16px;
    resize: none;
    min-height: 140px;
    transition: border-color 0.2s;
    outline: none;
  }

  textarea:focus {
    border-color: rgba(0,229,255,0.4);
  }

  textarea::placeholder { color: var(--text-muted); }

  /* 업로드 존 */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    background: var(--surface2);
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(0,229,255,0.03);
  }

  .upload-zone input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon {
    font-size: 36px;
    margin-bottom: 12px;
    display: block;
  }

  .upload-text {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .upload-text strong {
    color: var(--accent);
    display: block;
    font-size: 15px;
    margin-bottom: 4px;
  }

  /* 미리보기 */
  .preview-wrap {
    position: relative;
    margin-top: 16px;
    display: none;
  }

  .preview-wrap.show { display: block; }

  .preview-wrap img {
    width: 100%;
    max-height: 300px;
    object-fit: contain;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .preview-file {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .preview-file .file-icon { font-size: 24px; }

  .preview-file .file-info { flex: 1; }
  .preview-file .file-name { font-size: 14px; font-weight: 500; }
  .preview-file .file-size { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .remove-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
    transition: color 0.2s;
  }
  .remove-btn:hover { color: var(--error); }

  /* 전송 버튼 */
  .send-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent) 0%, #00b8d4 100%);
    border: none;
    border-radius: 12px;
    color: #000;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: 0.5px;
  }

  .send-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,229,255,0.25);
  }

  .send-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  /* 로딩 */
  .loading {
    display: none;
    text-align: center;
    padding: 32px;
  }

  .loading.show { display: block; }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 13px;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
  }

  /* 결과 */
  .result-card {
    display: none;
    animation: fadeIn 0.4s ease;
  }

  .result-card.show { display: block; }

  .result-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .result-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .badge-ai {
    background: rgba(0,229,255,0.1);
    color: var(--accent);
    border: 1px solid rgba(0,229,255,0.2);
  }

  .badge-sms {
    background: rgba(0,230,118,0.1);
    color: var(--success);
    border: 1px solid rgba(0,230,118,0.2);
  }

  .badge-sms-fail {
    background: rgba(255,23,68,0.1);
    color: var(--error);
    border: 1px solid rgba(255,23,68,0.2);
  }

  .answer-text {
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* 구분선 */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }

  /* 알림 */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 13px;
    transition: transform 0.3s ease;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(0,230,118,0.4); color: var(--success); }
  .toast.error { border-color: rgba(255,23,68,0.4); color: var(--error); }

  /* 반응형 */
  @media (max-width: 480px) {
    h1 { font-size: 24px; }
    .card { padding: 16px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">AI Study Assistant</div>
    <h1>Study<span>AI</span></h1>
    <p class="subtitle">문제를 입력하면 AI가 풀고 SMS로 답변을 보내드립니다</p>
  </header>

  <!-- 탭 -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('text')">
      ✏️ 텍스트
    </button>
    <button class="tab" onclick="switchTab('image')">
      🖼️ 이미지
    </button>
    <button class="tab" onclick="switchTab('file')">
      📄 파일(PDF)
    </button>
  </div>

  <!-- 텍스트 패널 -->
  <div class="panel active" id="panel-text">
    <div class="card">
      <div class="card-label">문제 입력</div>
      <textarea id="text-input" placeholder="풀고 싶은 문제를 입력하세요.&#10;예) 피타고라스 정리를 이용해 빗변의 길이를 구하시오."></textarea>
    </div>
  </div>

  <!-- 이미지 패널 -->
  <div class="panel" id="panel-image">
    <div class="card">
      <div class="card-label">이미지 업로드</div>
      <div class="upload-zone" id="image-zone">
        <input type="file" id="image-input" accept="image/*" onchange="handleImageFile(this)">
        <span class="upload-icon">📸</span>
        <div class="upload-text">
          <strong>이미지를 선택하거나 드래그하세요</strong>
          JPG, PNG, GIF, WEBP 지원
        </div>
      </div>
      <div class="preview-wrap" id="image-preview">
        <img id="preview-img" src="" alt="미리보기">
        <button class="remove-btn" onclick="removeFile('image')" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.6);border-radius:50%;width:28px;height:28px;font-size:14px;">✕</button>
      </div>
    </div>
    <div class="card">
      <div class="card-label">추가 질문 (선택)</div>
      <textarea id="image-question" placeholder="이미지에 대한 추가 질문을 입력하세요. (비워두면 자동으로 문제를 풀어드립니다)" style="min-height:80px;"></textarea>
    </div>
  </div>

  <!-- 파일 패널 -->
  <div class="panel" id="panel-file">
    <div class="card">
      <div class="card-label">PDF 업로드</div>
      <div class="upload-zone" id="file-zone">
        <input type="file" id="file-input" accept=".pdf,application/pdf" onchange="handlePdfFile(this)">
        <span class="upload-icon">📄</span>
        <div class="upload-text">
          <strong>PDF 파일을 선택하거나 드래그하세요</strong>
          문제지, 시험지 등 PDF 파일 지원
        </div>
      </div>
      <div class="preview-wrap" id="file-preview">
        <div class="preview-file">
          <span class="file-icon">📄</span>
          <div class="file-info">
            <div class="file-name" id="file-name"></div>
            <div class="file-size" id="file-size"></div>
          </div>
          <button class="remove-btn" onclick="removeFile('file')">✕</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-label">질문 입력</div>
      <textarea id="file-question" placeholder="PDF의 몇 번 문제를 풀어드릴까요?&#10;예) 3번 문제를 풀어주세요." style="min-height:80px;"></textarea>
    </div>
  </div>

  <!-- 전송 버튼 -->
  <button class="send-btn" id="send-btn" onclick="submit()">
    <span>📨</span> AI 답변 받기 (SMS 발송)
  </button>

  <!-- 로딩 -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">AI가 문제를 분석 중...</div>
  </div>

  <!-- 결과 -->
  <div class="result-card card" id="result-card">
    <div class="result-header">
      <span class="result-badge badge-ai">✦ AI 답변</span>
      <span class="result-badge" id="sms-badge"></span>
    </div>
    <div class="answer-text" id="answer-text"></div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
  const API_URL = "https://study-ai-sand.vercel.app/api/send";

  let currentTab = 'text';
  let imageData = null;
  let imageMime = null;
  let pdfData = null;

  // 탭 전환
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['text','image','file'][i] === tab);
    });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    hideResult();
  }

  // 이미지 처리
  function handleImageFile(input) {
    const file = input.files[0];
    if (!file) return;
    imageMime = file.type || 'image/jpeg';
    const reader = new FileReader();
    reader.onload = e => {
      imageData = e.target.result.split(',')[1];
      document.getElementById('preview-img').src = e.target.result;
      document.getElementById('image-preview').classList.add('show');
    };
    reader.readAsDataURL(file);
  }

  // PDF 처리
  function handlePdfFile(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      pdfData = e.target.result.split(',')[1];
      document.getElementById('file-name').textContent = file.name;
      document.getElementById('file-size').textContent = (file.size / 1024).toFixed(1) + ' KB';
      document.getElementById('file-preview').classList.add('show');
    };
    reader.readAsDataURL(file);
  }

  // 파일 제거
  function removeFile(type) {
    if (type === 'image') {
      imageData = null; imageMime = null;
      document.getElementById('image-input').value = '';
      document.getElementById('image-preview').classList.remove('show');
    } else {
      pdfData = null;
      document.getElementById('file-input').value = '';
      document.getElementById('file-preview').classList.remove('show');
    }
  }

  // 드래그앤드롭
  ['image-zone', 'file-zone'].forEach(id => {
    const zone = document.getElementById(id);
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (!file) return;
      if (id === 'image-zone') {
        const dt = new DataTransfer();
        dt.items.add(file);
        document.getElementById('image-input').files = dt.files;
        handleImageFile(document.getElementById('image-input'));
      } else {
        const dt = new DataTransfer();
        dt.items.add(file);
        document.getElementById('file-input').files = dt.files;
        handlePdfFile(document.getElementById('file-input'));
      }
    });
  });

  // 결과 숨기기
  function hideResult() {
    document.getElementById('result-card').classList.remove('show');
    document.getElementById('loading').classList.remove('show');
  }

  // 로딩 메시지 순환
  const loadingMessages = [
    'AI가 문제를 분석 중...',
    '답변을 생성하고 있어요...',
    'SMS 발송 준비 중...'
  ];
  let msgIdx = 0;
  let msgInterval;

  function startLoadingMessages() {
    msgIdx = 0;
    document.getElementById('loading-text').textContent = loadingMessages[0];
    msgInterval = setInterval(() => {
      msgIdx = (msgIdx + 1) % loadingMessages.length;
      document.getElementById('loading-text').textContent = loadingMessages[msgIdx];
    }, 3000);
  }

  // 제출
  async function submit() {
    const btn = document.getElementById('send-btn');
    const loading = document.getElementById('loading');

    // 입력값 수집
    let body = {};

    if (currentTab === 'text') {
      const q = document.getElementById('text-input').value.trim();
      if (!q) { showToast('문제를 입력해주세요.', 'error'); return; }
      body = { question: q };

    } else if (currentTab === 'image') {
      if (!imageData) { showToast('이미지를 업로드해주세요.', 'error'); return; }
      const q = document.getElementById('image-question').value.trim();
      body = {
        question: q || '이 문제를 풀어주세요. 한국어로 간결하게.',
        image: imageData,
        mime: imageMime
      };

    } else if (currentTab === 'file') {
      if (!pdfData) { showToast('PDF 파일을 업로드해주세요.', 'error'); return; }
      const q = document.getElementById('file-question').value.trim();
      body = {
        question: q || '이 문제지의 모든 문제를 풀어주세요.',
        image: pdfData,
        mime: 'application/pdf'
      };
    }

    // UI 상태
    btn.disabled = true;
    hideResult();
    loading.classList.add('show');
    startLoadingMessages();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();

      clearInterval(msgInterval);
      loading.classList.remove('show');

      if (data.ok) {
        // 답변 표시
        document.getElementById('answer-text').textContent = data.answer;

        // SMS 상태 뱃지
        const smsBadge = document.getElementById('sms-badge');
        if (data.sms === '발송완료') {
          smsBadge.className = 'result-badge badge-sms';
          smsBadge.textContent = '📱 SMS 발송완료';
          showToast('SMS가 발송됐습니다! 📱', 'success');
        } else {
          smsBadge.className = 'result-badge badge-sms-fail';
          smsBadge.textContent = '⚠️ SMS 실패';
        }

        document.getElementById('result-card').classList.add('show');
      } else {
        showToast('오류: ' + (data.error || '알 수 없는 오류'), 'error');
      }
    } catch (e) {
      clearInterval(msgInterval);
      loading.classList.remove('show');
      showToast('서버 연결 오류가 발생했습니다.', 'error');
    }

    btn.disabled = false;
  }

  // 토스트
  function showToast(msg, type = '') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast show ' + type;
    setTimeout(() => toast.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
