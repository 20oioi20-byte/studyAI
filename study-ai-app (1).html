<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyAI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #00e5ff;
    --text: #f0f0f0;
    --text-muted: #666;
    --success: #00e676;
    --error: #ff1744;
    --warn: #ffab00;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(0,229,255,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(124,58,237,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container { width: 100%; max-width: 680px; position: relative; z-index: 1; }

  header { text-align: center; margin-bottom: 36px; }
  .logo { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; opacity: 0.8; }
  h1 { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
  h1 span { color: var(--accent); }
  .subtitle { font-size: 13px; color: var(--text-muted); margin-top: 8px; font-weight: 300; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 14px;
  }

  .card-label {
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-muted); font-family: 'Space Mono', monospace; margin-bottom: 12px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .card-label .badge {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    background: rgba(0,229,255,0.1); color: var(--accent);
    border: 1px solid rgba(0,229,255,0.2); letter-spacing: 0;
  }

  .card-label .badge.warn {
    background: rgba(255,171,0,0.1); color: var(--warn);
    border-color: rgba(255,171,0,0.2);
  }

  /* 자료 업로드 섹션 */
  .materials-section { margin-bottom: 6px; }

  .material-types {
    display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
  }

  .mat-btn {
    padding: 7px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px; cursor: pointer; transition: all 0.2s;
  }
  .mat-btn:hover { border-color: var(--accent); color: var(--accent); }

  .material-list { display: flex; flex-direction: column; gap: 8px; }

  .material-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    animation: fadeIn 0.3s ease;
  }

  .material-item .mat-icon { font-size: 20px; flex-shrink: 0; }
  .material-item .mat-info { flex: 1; }
  .material-item .mat-name { font-size: 13px; font-weight: 500; }
  .material-item .mat-size { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .material-item .mat-source { font-size: 10px; color: var(--accent); margin-top: 2px; font-family: 'Space Mono', monospace; }

  .remove-btn {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 16px; padding: 4px;
    transition: color 0.2s; flex-shrink: 0;
  }
  .remove-btn:hover { color: var(--error); }

  .empty-materials {
    text-align: center; padding: 20px;
    color: var(--text-muted); font-size: 13px;
    border: 2px dashed var(--border); border-radius: 10px;
  }

  /* 텍스트 입력 */
  .input-wrap { position: relative; }

  textarea {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px; line-height: 1.6; padding: 14px;
    resize: none; transition: border-color 0.2s; outline: none;
  }
  textarea:focus { border-color: rgba(0,229,255,0.4); }
  textarea::placeholder { color: var(--text-muted); }

  /* 문제 탭 */
  .tabs {
    display: flex; gap: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 4px; margin-bottom: 12px;
  }
  .tab {
    flex: 1; padding: 8px; border: none; background: transparent;
    color: var(--text-muted); font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px; font-weight: 500; border-radius: 7px;
    cursor: pointer; transition: all 0.2s;
  }
  .tab.active { background: var(--surface); color: var(--accent); border: 1px solid rgba(0,229,255,0.2); }
  .tab:hover:not(.active) { color: var(--text); }

  .panel { display: none; animation: fadeIn 0.3s ease; }
  .panel.active { display: block; }

  /* 업로드존 */
  .upload-zone {
    border: 2px dashed var(--border); border-radius: 10px;
    padding: 28px 20px; text-align: center; cursor: pointer;
    transition: all 0.2s; position: relative; background: var(--surface2);
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent); background: rgba(0,229,255,0.03);
  }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { font-size: 28px; margin-bottom: 8px; display: block; }
  .upload-text { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
  .upload-text strong { color: var(--accent); display: block; font-size: 14px; margin-bottom: 3px; }

  .preview-wrap { position: relative; margin-top: 12px; display: none; }
  .preview-wrap.show { display: block; }
  .preview-wrap img { width: 100%; max-height: 250px; object-fit: contain; border-radius: 8px; border: 1px solid var(--border); }

  /* 전송 버튼 */
  .send-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--accent) 0%, #00b8d4 100%);
    border: none; border-radius: 12px; color: #000;
    font-family: 'Noto Sans KR', sans-serif; font-size: 15px;
    font-weight: 700; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .send-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,229,255,0.25); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* 로딩 */
  .loading { display: none; text-align: center; padding: 28px; }
  .loading.show { display: block; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 12px; color: var(--text-muted); font-family: 'Space Mono', monospace; }

  /* 결과 */
  .result-card { display: none; animation: fadeIn 0.4s ease; }
  .result-card.show { display: block; }

  .result-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }

  .result-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px;
    font-size: 11px; font-family: 'Space Mono', monospace;
    font-weight: 700; letter-spacing: 0.5px;
  }
  .badge-ai { background: rgba(0,229,255,0.1); color: var(--accent); border: 1px solid rgba(0,229,255,0.2); }
  .badge-sms { background: rgba(0,230,118,0.1); color: var(--success); border: 1px solid rgba(0,230,118,0.2); }
  .badge-sms-fail { background: rgba(255,23,68,0.1); color: var(--error); border: 1px solid rgba(255,23,68,0.2); }
  .badge-source { background: rgba(255,171,0,0.1); color: var(--warn); border: 1px solid rgba(255,171,0,0.2); }

  .answer-text { font-size: 15px; line-height: 1.8; color: var(--text); white-space: pre-wrap; word-break: break-word; }

  /* 토스트 */
  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 18px; font-size: 13px;
    transition: transform 0.3s ease; z-index: 100; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(0,230,118,0.4); color: var(--success); }
  .toast.error { border-color: rgba(255,23,68,0.4); color: var(--error); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 480px) { h1 { font-size: 24px; } .card { padding: 14px; } }

  /* 숨겨진 파일 입력 */
  #mat-image-input, #mat-pdf-input, #mat-text-input { display: none; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">AI Study Assistant</div>
    <h1>Study<span>AI</span></h1>
    <p class="subtitle">문제를 입력하면 AI가 풀고 SMS로 답변을 보내드립니다</p>
  </header>

  <!-- 참고자료 -->
  <div class="card materials-section">
    <div class="card-label">
      📚 참고자료
      <span class="badge warn" id="mat-count-badge" style="display:none"></span>
    </div>
    <div class="material-types">
      <button class="mat-btn" onclick="document.getElementById('mat-image-input').click()">🖼️ 이미지 추가</button>
      <button class="mat-btn" onclick="document.getElementById('mat-pdf-input').click()">📄 PDF 추가</button>
      <button class="mat-btn" onclick="addTextMaterial()">✏️ 텍스트 추가</button>
    </div>
    <input type="file" id="mat-image-input" accept="image/*" multiple onchange="handleMaterialImage(this)">
    <input type="file" id="mat-pdf-input" accept=".pdf,application/pdf" multiple onchange="handleMaterialPdf(this)">
    <div class="material-list" id="material-list">
      <div class="empty-materials" id="empty-materials">자료 없음 — AI 자체 지식으로 답변합니다</div>
    </div>
  </div>

  <!-- 문제 입력 -->
  <div class="card">
    <div class="card-label">📝 문제 입력</div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('text')">✏️ 텍스트</button>
      <button class="tab" onclick="switchTab('image')">🖼️ 이미지</button>
      <button class="tab" onclick="switchTab('file')">📄 PDF</button>
    </div>

    <!-- 텍스트 -->
    <div class="panel active" id="panel-text">
      <textarea id="text-input" rows="5" placeholder="풀고 싶은 문제를 입력하세요.&#10;예) 1번: 대한민국 수도는? 2번: 피타고라스 정리를 설명하시오."></textarea>
    </div>

    <!-- 이미지 -->
    <div class="panel" id="panel-image">
      <div class="upload-zone" id="image-zone">
        <input type="file" id="image-input" accept="image/*" onchange="handleQuestionImage(this)">
        <span class="upload-icon">📸</span>
        <div class="upload-text"><strong>이미지를 선택하거나 드래그하세요</strong>JPG, PNG, GIF, WEBP 지원</div>
      </div>
      <div class="preview-wrap" id="image-preview">
        <img id="preview-img" src="" alt="미리보기">
        <button class="remove-btn" onclick="removeQuestion()" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.7);border-radius:50%;width:26px;height:26px;font-size:13px;">✕</button>
      </div>
      <textarea id="image-question" rows="2" style="margin-top:10px;" placeholder="추가 질문 (선택) — 비워두면 자동으로 문제를 풀어드립니다"></textarea>
    </div>

    <!-- PDF -->
    <div class="panel" id="panel-file">
      <div class="upload-zone" id="file-zone">
        <input type="file" id="file-input" accept=".pdf,application/pdf" onchange="handleQuestionPdf(this)">
        <span class="upload-icon">📄</span>
        <div class="upload-text"><strong>PDF 파일을 선택하거나 드래그하세요</strong>문제지, 시험지 등</div>
      </div>
      <div class="preview-wrap" id="file-preview">
        <div style="display:flex;align-items:center;gap:10px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;">
          <span style="font-size:22px;">📄</span>
          <div style="flex:1;"><div id="file-name" style="font-size:13px;font-weight:500;"></div><div id="file-size" style="font-size:11px;color:var(--text-muted);margin-top:2px;"></div></div>
          <button class="remove-btn" onclick="removeQuestion('file')">✕</button>
        </div>
      </div>
      <textarea id="file-question" rows="2" style="margin-top:10px;" placeholder="몇 번 문제를 풀어드릴까요?"></textarea>
    </div>
  </div>

  <!-- 전송 버튼 -->
  <button class="send-btn" id="send-btn" onclick="submit()">
    <span>📨</span> AI 답변 받기 (SMS 발송)
  </button>

  <!-- 로딩 -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">AI가 문제를 분석 중...</div>
  </div>

  <!-- 결과 -->
  <div class="result-card card" id="result-card">
    <div class="result-header">
      <span class="result-badge badge-ai">✦ AI 답변</span>
      <span class="result-badge" id="sms-badge"></span>
      <span class="result-badge badge-source" id="source-badge" style="display:none">📚 자료 참조</span>
    </div>
    <div class="answer-text" id="answer-text"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 텍스트 자료 모달 -->
<div id="text-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:90%;max-width:500px;">
    <div style="font-size:14px;font-weight:700;margin-bottom:12px;">✏️ 텍스트 자료 입력</div>
    <textarea id="text-material-input" rows="8" placeholder="참고자료 텍스트를 붙여넣으세요.&#10;교재 내용, 노트 정리, 공식 등"></textarea>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button onclick="closeTextModal()" style="flex:1;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-family:'Noto Sans KR',sans-serif;">취소</button>
      <button onclick="saveTextMaterial()" style="flex:2;padding:10px;background:var(--accent);border:none;border-radius:8px;color:#000;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">추가</button>
    </div>
  </div>
</div>

<script>
  const API_URL = "https://study-ai-sand.vercel.app/api/send";

  let currentTab = 'text';
  let questionImage = null;
  let questionImageMime = null;
  let questionPdf = null;
  let materials = []; // { id, type, name, size, data, mime }

  // ===== 탭 =====
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['text','image','file'][i] === tab);
    });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    hideResult();
  }

  // ===== 참고자료 =====
  function handleMaterialImage(input) {
    Array.from(input.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        materials.push({
          id: Date.now() + Math.random(),
          type: 'image',
          name: file.name,
          size: (file.size/1024).toFixed(1) + ' KB',
          data: e.target.result.split(',')[1],
          mime: file.type || 'image/jpeg'
        });
        renderMaterials();
      };
      reader.readAsDataURL(file);
    });
    input.value = '';
  }

  function handleMaterialPdf(input) {
    Array.from(input.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        materials.push({
          id: Date.now() + Math.random(),
          type: 'pdf',
          name: file.name,
          size: (file.size/1024).toFixed(1) + ' KB',
          data: e.target.result.split(',')[1],
          mime: 'application/pdf'
        });
        renderMaterials();
      };
      reader.readAsDataURL(file);
    });
    input.value = '';
  }

  function addTextMaterial() {
    document.getElementById('text-modal').style.display = 'flex';
    document.getElementById('text-material-input').value = '';
  }

  function closeTextModal() {
    document.getElementById('text-modal').style.display = 'none';
  }

  function saveTextMaterial() {
    const text = document.getElementById('text-material-input').value.trim();
    if (!text) { showToast('내용을 입력해주세요.', 'error'); return; }
    materials.push({
      id: Date.now(),
      type: 'text',
      name: text.slice(0, 20) + (text.length > 20 ? '...' : ''),
      size: text.length + '자',
      data: text,
      mime: null
    });
    renderMaterials();
    closeTextModal();
  }

  function removeMaterial(id) {
    materials = materials.filter(m => m.id !== id);
    renderMaterials();
  }

  function renderMaterials() {
    const list = document.getElementById('material-list');
    const empty = document.getElementById('empty-materials');
    const badge = document.getElementById('mat-count-badge');

    if (materials.length === 0) {
      empty.style.display = 'block';
      badge.style.display = 'none';
      list.innerHTML = '';
      list.appendChild(empty);
      return;
    }

    empty.style.display = 'none';
    badge.style.display = 'inline-flex';
    badge.textContent = materials.length + '개 자료';

    list.innerHTML = '';
    materials.forEach(mat => {
      const icon = mat.type === 'image' ? '🖼️' : mat.type === 'pdf' ? '📄' : '✏️';
      const sourceLabel = mat.type === 'image' ? 'IMAGE' : mat.type === 'pdf' ? 'PDF' : 'TEXT';
      const div = document.createElement('div');
      div.className = 'material-item';
      div.innerHTML = `
        <span class="mat-icon">${icon}</span>
        <div class="mat-info">
          <div class="mat-name">${mat.name}</div>
          <div class="mat-size">${mat.size}</div>
          <div class="mat-source">${sourceLabel}</div>
        </div>
        <button class="remove-btn" onclick="removeMaterial(${mat.id})">✕</button>
      `;
      list.appendChild(div);
    });
  }

  // ===== 문제 입력 =====
  function handleQuestionImage(input) {
    const file = input.files[0]; if (!file) return;
    questionImageMime = file.type || 'image/jpeg';
    const reader = new FileReader();
    reader.onload = e => {
      questionImage = e.target.result.split(',')[1];
      document.getElementById('preview-img').src = e.target.result;
      document.getElementById('image-preview').classList.add('show');
    };
    reader.readAsDataURL(file);
  }

  function handleQuestionPdf(input) {
    const file = input.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      questionPdf = e.target.result.split(',')[1];
      document.getElementById('file-name').textContent = file.name;
      document.getElementById('file-size').textContent = (file.size/1024).toFixed(1) + ' KB';
      document.getElementById('file-preview').classList.add('show');
    };
    reader.readAsDataURL(file);
  }

  function removeQuestion(type) {
    if (type === 'file') {
      questionPdf = null;
      document.getElementById('file-input').value = '';
      document.getElementById('file-preview').classList.remove('show');
    } else {
      questionImage = null; questionImageMime = null;
      document.getElementById('image-input').value = '';
      document.getElementById('image-preview').classList.remove('show');
    }
  }

  // ===== 드래그앤드롭 =====
  ['image-zone','file-zone'].forEach(id => {
    const zone = document.getElementById(id);
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('dragover');
      const file = e.dataTransfer.files[0]; if (!file) return;
      const dt = new DataTransfer(); dt.items.add(file);
      if (id === 'image-zone') { document.getElementById('image-input').files = dt.files; handleQuestionImage(document.getElementById('image-input')); }
      else { document.getElementById('file-input').files = dt.files; handleQuestionPdf(document.getElementById('file-input')); }
    });
  });

  function hideResult() {
    document.getElementById('result-card').classList.remove('show');
    document.getElementById('loading').classList.remove('show');
  }

  const loadingMessages = ['AI가 자료를 분석 중...', '답변을 생성하고 있어요...', 'SMS 발송 준비 중...'];
  let msgIdx = 0, msgInterval;

  function startLoading() {
    msgIdx = 0;
    document.getElementById('loading-text').textContent = loadingMessages[0];
    msgInterval = setInterval(() => {
      msgIdx = (msgIdx + 1) % loadingMessages.length;
      document.getElementById('loading-text').textContent = loadingMessages[msgIdx];
    }, 3000);
  }

  // ===== 전송 =====
  async function submit() {
    const btn = document.getElementById('send-btn');
    let body = {};

    if (currentTab === 'text') {
      const q = document.getElementById('text-input').value.trim();
      if (!q) { showToast('문제를 입력해주세요.', 'error'); return; }
      body = { question: q };
    } else if (currentTab === 'image') {
      if (!questionImage) { showToast('이미지를 업로드해주세요.', 'error'); return; }
      const q = document.getElementById('image-question').value.trim();
      body = { question: q || '이 문제를 풀어주세요.', image: questionImage, mime: questionImageMime };
    } else {
      if (!questionPdf) { showToast('PDF를 업로드해주세요.', 'error'); return; }
      const q = document.getElementById('file-question').value.trim();
      body = { question: q || '이 문제지의 문제를 풀어주세요.', image: questionPdf, mime: 'application/pdf' };
    }

    // 참고자료 추가
    if (materials.length > 0) {
      body.materials = materials.map(m => ({ type: m.type, data: m.data, mime: m.mime }));
    }

    btn.disabled = true;
    hideResult();
    document.getElementById('loading').classList.add('show');
    startLoading();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();

      clearInterval(msgInterval);
      document.getElementById('loading').classList.remove('show');

      if (data.ok) {
        document.getElementById('answer-text').textContent = data.answer;

        const smsBadge = document.getElementById('sms-badge');
        if (data.sms === '발송완료') {
          smsBadge.className = 'result-badge badge-sms';
          smsBadge.textContent = `📱 SMS ${data.smsCount}건 발송완료`;
          showToast(`SMS ${data.smsCount}건 발송됐습니다! 📱`, 'success');
        } else {
          smsBadge.className = 'result-badge badge-sms-fail';
          smsBadge.textContent = '⚠️ SMS 실패';
        }

        const srcBadge = document.getElementById('source-badge');
        srcBadge.style.display = materials.length > 0 ? 'inline-flex' : 'none';

        document.getElementById('result-card').classList.add('show');
      } else {
        showToast('오류: ' + (data.error || '알 수 없는 오류'), 'error');
      }
    } catch (e) {
      clearInterval(msgInterval);
      document.getElementById('loading').classList.remove('show');
      showToast('서버 연결 오류가 발생했습니다.', 'error');
    }

    btn.disabled = false;
  }

  function showToast(msg, type = '') {
    const toast = document.getElementById('toast');
    toast.textContent = msg; toast.className = 'toast show ' + type;
    setTimeout(() => toast.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
